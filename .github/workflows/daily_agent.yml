name: Daily Sourcing Agent

on:
  schedule:
    # 7 AM ET (12:00 UTC) weekdays
    - cron: '0 12 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: false
        default: 'daily'
        type: choice
        options:
          - daily
          - weekly

permissions:
  contents: write

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Restore state cache
        uses: actions/cache@v4
        with:
          path: processed_solicitations.json
          key: agent-state-${{ github.run_id }}
          restore-keys: agent-state-

      - name: Run agent
        env:
          AGENT_MODE: ${{ github.event.inputs.mode || 'daily' }}
        run: |
          if [ "$AGENT_MODE" = "weekly" ]; then
            python run.py --scrape-only --weekly
          else
            python run.py --scrape-only
          fi

      - name: Upload agent log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-log-${{ github.run_id }}
          path: agent.log
          retention-days: 30

      - name: Push updated dashboard data to main
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Update dashboard data [skip ci]"
          git push origin main
