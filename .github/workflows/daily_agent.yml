name: Daily Sourcing Agent

on:
  schedule:
    # 5 PM ET (22:00 UTC) weekdays — daily mode
    - cron: '0 22 * * 1-5'
    # 5 PM ET (22:00 UTC) Saturday — weekly mode
    - cron: '0 22 * * 6'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: false
        default: 'daily'
        type: choice
        options:
          - daily
          - weekly

permissions:
  contents: write

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Record start time
        run: echo "WORKFLOW_START=$(date +%s)" >> $GITHUB_ENV

      - name: Checkout main
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Restore state cache
        uses: actions/cache@v4
        with:
          path: processed_dashboard.json
          key: dashboard-state-v4-${{ github.run_id }}
          restore-keys: dashboard-state-v4-

      - name: Run agent
        env:
          WORKFLOW_START: ${{ env.WORKFLOW_START }}
        run: |
          # Determine mode: manual input > Saturday auto-detect > daily default
          if [ -n "${{ github.event.inputs.mode }}" ]; then
            MODE="${{ github.event.inputs.mode }}"
          elif [ "$(date -u +%u)" = "6" ]; then
            MODE="weekly"
          else
            MODE="daily"
          fi
          echo "Running in $MODE mode"
          if [ "$MODE" = "weekly" ]; then
            python run.py --scrape-only --weekly
          else
            python run.py --scrape-only
          fi

      - name: Upload agent log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-log-${{ github.run_id }}
          path: agent.log
          retention-days: 30

      - name: Push updated dashboard data to main
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Update dashboard data [skip ci]"
          git pull --rebase origin main || true
          git push origin main
